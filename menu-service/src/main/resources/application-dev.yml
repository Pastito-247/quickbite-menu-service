# Configuración para desarrollo
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/quickbite_menu_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.quickbite.menu_service: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Configuración para desarrollo local
server:
  port: 8081

# Mock de servicios externos para desarrollo
app:
  services:
    inventory:
      mock: true
      url: http://localhost:8082
    orders:
      mock: true
      url: http://localhost:8083
